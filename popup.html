<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>选择要录屏的页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f7f7f7;
        }

        .header-bar {
            display: flex;
            align-items: center;
            margin: 16px 0 8px 16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            margin-right: 18px;
        }

        #recordCurrentTab {
            padding: 6px 16px;
            background: #e53935;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }

        .tab-list {
            padding: 0;
            margin: 0 0 16px 0;
            list-style: none;
        }

        .tab-item {
            background: #fff;
            margin: 10px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 12px 16px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .tab-item:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            background: #fbe9e7;
        }

        .tab-title {
            font-size: 16px;
            color: #222;
        }

        .feature-info {
            margin: 16px;
            padding: 12px;
            background: #e8f5e8;
            border-radius: 6px;
            font-size: 12px;
            color: #2e7d32;
        }
    </style>
</head>

<body>
    <div class="header-bar">
        <span class="header-title">选择要录屏的页面</span>
        <button id="recordCurrentTab">录制当前标签页</button>
    </div>
    <div class="feature-info">
        ✨ 新功能：支持分段录制，适合长时间录课，每30分钟自动保存一段
    </div>
    <ul class="tab-list" id="tabList"></ul>
    <div style="text-align:center;padding:10px;border-top:1px solid #eee;margin-top:10px;">
        <span style="font-size:12px;color:#888;">版本 v2.1.0</span>
        <button id="checkUpdate"
            style="margin-left:10px;padding:2px 8px;font-size:12px;background:#4CAF50;color:#fff;border:none;border-radius:3px;cursor:pointer;">检查更新</button>
        <button id="manualUpdate"
            style="margin-left:5px;padding:2px 8px;font-size:12px;background:#2196F3;color:#fff;border:none;border-radius:3px;cursor:pointer;">手动升级</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
